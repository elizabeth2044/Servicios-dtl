<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rethink+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* Minificación básica de estilos críticos */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Rethink Sans',sans-serif;background:#4d3032;padding:48px 44px 60px;overflow:hidden;text-rendering:optimizeLegibility;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
.stag{font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:rgba(219,215,203,.5);margin-bottom:14px}
.titulo{font-size:36px;font-weight:700;color:#dbd7cb;line-height:1.15;margin-bottom:40px;max-width:520px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;align-items:stretch}
.card{border-radius:18px;overflow:hidden;cursor:pointer;transition:all .4s ease;border:1.5px solid rgba(219,215,203,.2);background:rgba(219,215,203,.06);display:flex;flex-direction:column}
.card:hover{border-color:rgba(219,215,203,.4);background:rgba(219,215,203,.1)}
.cimg{width:100%;height:150px;overflow:hidden;flex-shrink:0;background:#3a2224;border-radius:16px 16px 0 0}
.cimg svg{width:100%;height:100%;display:block}
.cbody{padding:14px 16px 18px;display:flex;flex-direction:column;gap:6px}
.ctit{font-size:15px;font-weight:600;color:rgba(219,215,203,.55);line-height:1.3}
.ccta{display:inline-flex;align-items:center;gap:7px;font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(219,215,203,.45);margin-top:2px;transition:all .3s}
.card.on{background:#e8e4da;border-color:#e8e4da;position:relative}
.card.on .ctit{font-size:16px;color:#3a2224;font-weight:700}
.card.on .ccta{display:none}

/* Media Queries optimizadas */
@media(max-width:700px){
  body{padding:36px 20px 48px}
  .titulo{font-size:26px;margin-bottom:28px}
  .grid{display:none}
  .mobile-wrap{display:block}
}
/* ... (resto de tus estilos m-card que ya tenías) ... */
</style>
</head>
<body>
<div id="wrap">
  </div>

<script>
// Notificar altura inmediatamente para evitar saltos en Wix
function notifyHeight() {
  const wrap = document.getElementById('wrap');
  if (wrap) {
    const h = wrap.scrollHeight;
    window.parent.postMessage({ height: h + 10 }, '*');
  }
}
window.onload = notifyHeight;
window.onresize = notifyHeight;
// ... (tus funciones de activación y carrusel) ...
</script>
</body>
</html>
